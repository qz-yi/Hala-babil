kind = "mobile"
previewPath = "/"
title = "Hilla Connect"
version = "1.0.0"
id = "artifacts/hilla-connect-v2"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/hilla-connect-v2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hilla-connect-v2", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hilla-connect-v2", "run", "serve" ]

[services.env]
PORT = "8080"
BASE_PATH = "/"
