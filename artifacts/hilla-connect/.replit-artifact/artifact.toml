kind = "mobile"
previewPath = "/"
title = "Hilla Connect"
version = "1.0.0"
id = "artifacts/hilla-connect"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19064

[services.development]
run = "pnpm --filter @workspace/hilla-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hilla-connect", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hilla-connect", "run", "serve" ]

[services.env]
PORT = "19064"
BASE_PATH = "/"
